<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>មេឃ កាហ្វេ MEK CAFE | Welcome</title>
    <!-- Tailwind CSS + Font Awesome 6 + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
      }
      .khmer-logo {
        font-family: 'Noto Sans Khmer', 'Khmer OS', sans-serif;
        font-weight: 600;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
      }
      .splash-screen {
        background: linear-gradient(135deg, #8a6f57 0%, #5e3e2b 100%);
      }
      .logo-large {
        width: 130px;
        height: 130px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid #e8dcc8;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(232, 220, 200, 0.3);
        border-top-color: #e8dcc8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- SPLASH SCREEN - First interface showing logo and name -->
    <div
      id="splashScreen"
      class="splash-screen fixed inset-0 z-50 flex items-center justify-center transition-all duration-1000"
    >
      <div class="text-center animate-fade-in-up px-6">
        <img
          id="splashLogo"
          class="logo-large mx-auto mb-6"
          src="image/MEK CAFE.png"
          alt="មេឃ កាហ្វេ MEK CAFE"
          onerror="
            this.onerror = null;
            this.src =
              'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27%23E8DCC8%27%3E%3Cpath d=%27M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z%27/%3E%3C/svg%3E';
          "
        />
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-3 khmer-logo">មេឃ កាហ្វេ</h1>
        <p class="text-xl text-[#E8DCC8] mb-2">MEK CAFE</p>
        <p class="text-sm text-[#E8DCC8]/80 mb-8">Artisan Coffee POS System</p>
        <div class="flex justify-center">
          <div class="loading-spinner"></div>
        </div>
        <p class="text-xs text-[#E8DCC8]/70 mt-4">Loading system...</p>
      </div>
    </div>

    <script>
      // Redirect to login page after splash screen
      setTimeout(function () {
        var splash = document.getElementById('splashScreen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function () {
            window.location.href = 'login.html';
          }, 700);
        }
      }, 2000);
    </script>
  </body>
</html>
