<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>មេឃ កាហ្វេ MEK CAFE | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          sans-serif;
      }
      .khmer-logo {
        font-family: 'Noto Sans Khmer', 'Khmer OS', sans-serif;
        font-weight: 600;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      .login-logo {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid #e8dcc8;
        margin: 0 auto 12px auto;
      }
      .error-alert {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: #dc2626;
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        z-index: 1000;
        transition: transform 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .error-alert.show {
        transform: translateX(-50%) translateY(0);
      }
      .password-toggle {
        cursor: pointer;
      }
      .password-toggle:hover {
        color: #8a6f57;
      }
    </style>
  </head>
  <body class="bg-[#F9F5EF] min-h-screen flex items-center justify-center">
    <div id="errorAlert" class="error-alert">
      <i class="fas fa-exclamation-triangle"></i><span id="errorMessage">Incorrect password</span>
    </div>

    <!-- LOGIN CARD -->
    <div
      class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 overflow-hidden animate-fade-in-up"
    >
      <div class="bg-[#8A6F57] px-6 py-5 text-[#E8DCC8] text-center">
        <img
          id="loginLogo"
          class="login-logo mx-auto"
          src="image/MEK CAFE.png"
          alt="មេឃ កាហ្វេ"
          onerror="
            this.onerror = null;
            this.src =
              'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27%23E8DCC8%27%3E%3Cpath d=%27M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z%27/%3E%3C/svg%3E';
          "
        />
        <h2 class="text-2xl font-bold mt-2 khmer-logo">មេឃ កាហ្វេ</h2>
        <p class="text-sm opacity-90">MEK CAFE · Secure POS System</p>
      </div>
      <div class="p-6">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            ><i class="fas fa-envelope mr-2 text-[#8A6F57]"></i>Email / Username</label
          >
          <input
            type="text"
            id="loginEmail"
            class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#8A6F57] focus:border-transparent"
            placeholder="admin@mekcafe.com"
          />
        </div>
        <div class="mb-5 relative">
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            ><i class="fas fa-lock mr-2 text-[#8A6F57]"></i>Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="loginPassword"
              class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#8A6F57] pr-10"
              placeholder="••••••"
            />
            <i
              id="togglePassword"
              class="fas fa-eye-slash absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 password-toggle"
            ></i>
          </div>
        </div>
        <button
          id="loginBtn"
          class="w-full bg-[#8A6F57] hover:bg-[#735B45] text-white font-bold py-2.5 rounded-xl transition shadow-md flex items-center justify-center gap-2"
        >
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        <div class="mt-5 pt-3 border-t border-gray-200 text-center text-xs text-stone-500">
          <p><i class="fas fa-users mr-1"></i> Demo Accounts:</p>
          <p class="mt-1">
            admin@mekcafe.com / admin123 &nbsp;|&nbsp; barista@mekcafe.com / barista123
          </p>
        </div>
      </div>
    </div>

    <script>
      // Pre-configured user accounts
      const users = [
        {
          id: 1,
          fullname: 'Admin User',
          email: 'admin@mekcafe.com',
          password: 'admin123',
          role: 'admin',
        },
        {
          id: 2,
          fullname: 'Barista Kim',
          email: 'barista@mekcafe.com',
          password: 'barista123',
          role: 'barista',
        },
      ];

      function showErrorAlert(msg) {
        const alertDiv = document.getElementById('errorAlert');
        const msgSpan = document.getElementById('errorMessage');
        if (alertDiv && msgSpan) {
          msgSpan.textContent = msg;
          alertDiv.classList.add('show');
          setTimeout(function () {
            alertDiv.classList.remove('show');
          }, 3000);
        }
      }

      function loginUser(email, password) {
        const user = users.find(function (u) {
          return u.email === email && u.password === password;
        });
        if (user) {
          const userData = {
            id: user.id,
            fullname: user.fullname,
            email: user.email,
            role: user.role,
          };
          localStorage.setItem('mekCafeCurrentUser', JSON.stringify(userData));
          return true;
        }
        return false;
      }

      // Show/Hide Password Toggle
      const togglePassword = document.getElementById('togglePassword');
      const loginPassword = document.getElementById('loginPassword');
      let isPasswordVisible = false;

      if (togglePassword) {
        togglePassword.addEventListener('click', function () {
          isPasswordVisible = !isPasswordVisible;
          loginPassword.type = isPasswordVisible ? 'text' : 'password';
          togglePassword.classList.toggle('fa-eye', isPasswordVisible);
          togglePassword.classList.toggle('fa-eye-slash', !isPasswordVisible);
        });
      }

      // Login Button Handler
      const loginBtn = document.getElementById('loginBtn');
      const loginEmail = document.getElementById('loginEmail');

      if (loginBtn) {
        loginBtn.addEventListener('click', function () {
          const email = loginEmail.value.trim();
          const password = loginPassword.value;

          if (!email || !password) {
            showErrorAlert('Please enter both email and password');
            return;
          }

          if (loginUser(email, password)) {
            window.location.href = 'cafepos.html';
          } else {
            showErrorAlert('❌ Incorrect password or email. Please try again.');
            const modalContent = document.querySelector('.bg-white');
            if (modalContent) {
              modalContent.style.transform = 'translateX(5px)';
              setTimeout(function () {
                modalContent.style.transform = 'translateX(-5px)';
              }, 50);
              setTimeout(function () {
                modalContent.style.transform = 'translateX(3px)';
              }, 100);
              setTimeout(function () {
                modalContent.style.transform = 'translateX(0)';
              }, 200);
            }
          }
        });
      }

      // Enter key support
      if (loginPassword) {
        loginPassword.addEventListener('keypress', function (e) {
          if (e.key === 'Enter' && loginBtn) loginBtn.click();
        });
      }
      if (loginEmail) {
        loginEmail.addEventListener('keypress', function (e) {
          if (e.key === 'Enter' && loginBtn) loginBtn.click();
        });
      }
    </script>
  </body>
</html>
